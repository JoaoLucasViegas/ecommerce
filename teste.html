<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="hello(`${JSON.stringify(a)}`)">SAIR</button>

    <script>
        let a = {
            "texto": "Ola mundo!"
        }
        function hello(any) {
            alert(`${JSON.parse(any).texto} There!`)
        }
    </script>
</body>
</html>
